[build]
  command = "npm run build"
  publish = "dist/qa-rag-agent-ui/browser"

# Proxy API requests to Modal backend (update URL after modal deploy)
[[redirects]]
  from = "/api/*"
  to = "https://surajnehate--qa-rag-agent-fastapi-app.modal.run/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
